name: ランキング画像を Slack に投稿

on:
  schedule:
    # 0:05 UTC = 09:05 JST
    # 月〜金 JST に投稿（UTC でも同日）
    - cron: "5 0 * * MON,TUE,WED,THU,FRI"
  workflow_dispatch:
    inputs:
      force:
        description: "祝日でも強制投稿する"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm playwright install --with-deps chromium

      - name: Post ranking image
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          ASAKATSU_CHANNEL_ID: ${{ secrets.ASAKATSU_CHANNEL_ID }}
          FORCE_POST: ${{ inputs.force == 'true' && '1' || '0' }}
        run: pnpm tsx scripts/post-ranking.ts
